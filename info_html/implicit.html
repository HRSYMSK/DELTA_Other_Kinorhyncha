<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>implicit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #1f2937;
    }
    header {
      background: #1f3c88;
      color: white;
      padding: 12px 16px;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
    }
    main {
      max-width: 960px;
      margin: 16px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 20px;
      line-height: 1.65;
    }
    p {
      margin: 0 0 1em 0;
    }
    h2 {
      font-size: 18px;
      margin: 1.2em 0 0.5em 0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <header>
    <h1>implicit</h1>
  </header>
  <main>
    <p>Implicit Attributes</p><p>Unless indicated otherwise, the following attributes are implicit throughout the descriptions, except where the characters concerned are inapplicable.</p>
  </main>
</body>
</html>
